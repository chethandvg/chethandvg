name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 2 * * *"   # daily at 2am UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write settings file into workspace
        run: |
          mkdir -p conf
          cat > conf/settings.json << 'ENDJSON'
          {
            "type": "rainbow",
            "fileName": "profile-night-rainbow.svg",

            "backgroundColor": "#0d1117",
            "foregroundColor": "#e2d9f3",
            "strongColor": "#c084fc",
            "weakColor": "#1e1b4b",
            "radarColor": "#818cf8",

            "growingAnimation": true,

            "saturation": "85%",
            "contribLightness": ["8%", "25%", "40%", "55%", "72%"],
            "duration": "8s",
            "hueRatio": -5,

            "l10n": {
              "commit":  "Commits",
              "repo":    "Repos",
              "review":  "Reviews",
              "pullreq": "PRs",
              "issue":   "Issues",
              "contrib": "Contributions"
            }
          }
          ENDJSON

      - name: Generate 3D profile
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: chethandvg
          SETTING_JSON: conf/settings.json

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          add: "profile-3d-contrib"
          message: "Update 3D contribution graph"
